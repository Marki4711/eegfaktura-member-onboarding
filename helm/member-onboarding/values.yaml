# Default values for the member-onboarding Helm chart.
#
# Diese Datei enthält technische Defaults, die für alle Umgebungen gelten.
# Umgebungsspezifische Werte (Namespace, Ingress, Images) gehören in values-env.yaml.
# Secrets (Passwörter) gehören in values-secret.yaml.
#
# Beide Dateien sind gitignored. Verwende die .example-Dateien als Vorlage:
#   cp helm/member-onboarding/values-env.yaml.example helm/member-onboarding/values-env.yaml
#   cp helm/member-onboarding/values-secret.yaml.example helm/member-onboarding/values-secret.yaml
#
# Verwendung:
#   helm install eegfaktura-member-onboarding ./helm/member-onboarding \
#     -f helm/member-onboarding/values-env.yaml \
#     -f helm/member-onboarding/values-secret.yaml

# ── Namespace ──────────────────────────────────────────────────────────────────
namespace: default
# ── Ingress ────────────────────────────────────────────────────────────────────
ingress:
  host: ""
  className: nginx
  proxyReadTimeout: "60"
  proxySendTimeout: "60"
  proxyBufferSize: "128k"
  proxyBuffersNumber: "4"
# ── Images ─────────────────────────────────────────────────────────────────────
images:
  backend:
    repository: ""
    tag: sha-ac52156
    pullPolicy: IfNotPresent
  frontend:
    repository: ""
    tag: sha-ac52156
    pullPolicy: IfNotPresent
# ── PostgreSQL ─────────────────────────────────────────────────────────────────
postgres:
  user: postgres
  database: member_onboarding
  storageClassName: standard
  storageSize: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
# ── Backend ────────────────────────────────────────────────────────────────────
backend:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi
  logLevel: "INFO" # DEBUG | INFO | WARN | ERROR
  corsAllowedOrigins: ""
  smtp:
    host: "" # leer = Mail deaktiviert (NoOpMailService)
    port: "587"
    user: "" # leer = kein SMTP-Auth (open relay)
    from: "" # Pflicht wenn smtp.host gesetzt
  dbSslMode: "disable" # disable (interner Cluster-Postgres) | require (externer Postgres mit TLS)
  # Keycloak JWT-Validierung — leer = Dev-Modus (kein Auth)
  keycloakJwksUrl: "" # z.B. https://keycloak.example.at/realms/EEGFaktura/protocol/openid-connect/certs
  keycloakIssuer: "" # z.B. https://keycloak.example.at/realms/EEGFaktura
  # Zentrale Datenschutzerklärung des Tool-Betreibers (PROJ-9)
  centralPolicyTitle: "Datenschutzerklärung"
  centralPolicyUrl: "" # Optional: absolute URL zur Datenschutzerklärung (z.B. https://onboarding.example.at/datenschutz)
  # Leer lassen = internes /datenschutz wird verlinkt
  # eegFaktura Core service (PROJ-4 Import). Leer = Import-Endpoint disabled (503).
  # Pfad-Präfix (typischerweise /api) gehört in die URL.
  coreBaseUrl: "" # z.B. https://eegfaktura.example.at/api
  coreTimeoutSeconds: 30
# ── Seed data ──────────────────────────────────────────────────────────────────
seed:
  rcNumber: ""
  eegId: ""
# ── Frontend ───────────────────────────────────────────────────────────────────
frontend:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  logLevel: "info"
  backendUrl: ""
  # NextAuth / Keycloak — via values-env.yaml setzen
  nextauthUrl: "" # Öffentliche URL der App, z.B. https://member-onboarding.example.at
  keycloakIssuer: "" # z.B. https://keycloak.example.at/realms/EEGFaktura
  keycloakClientId: ""
# ── Scheduled restart ─────────────────────────────────────────────────────────
# Enables a monthly CronJob that restarts backend + frontend pods so they pick
# up refreshed images (e.g. after monthly security rebuilds pushing "latest").
# Requires imagePullPolicy: Always in values-env.yaml when using a floating tag.
restart:
  enabled: false
  schedule: "0 2 * * *" # daily at 02:00 UTC
  kubectlImage: "bitnami/kubectl:1.31"
# ── Secrets ────────────────────────────────────────────────────────────────────
# Niemals echte Werte hier eintragen — immer via values-secret.yaml übergeben.
secrets:
  postgresPassword: ""
  dbPassword: ""
  smtpPassword: ""
  # NextAuth session encryption key (generieren: openssl rand -base64 32)
  nextauthSecret: ""
  # Keycloak Client Secret
  keycloakClientSecret: ""
  # Cloudflare Turnstile Secret Key — leer lassen zum Deaktivieren (Dev-Modus)
  turnstileSecretKey: ""

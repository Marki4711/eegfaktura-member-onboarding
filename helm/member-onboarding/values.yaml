# Default values for the member-onboarding Helm chart.
#
# Diese Datei enthält technische Defaults, die für alle Umgebungen gelten.
# Umgebungsspezifische Werte (Namespace, Ingress, Images) gehören in values-env.yaml.
# Secrets (Passwörter) gehören in values-secret.yaml.
#
# Beide Dateien sind gitignored. Verwende die .example-Dateien als Vorlage:
#   cp helm/member-onboarding/values-env.yaml.example helm/member-onboarding/values-env.yaml
#   cp helm/member-onboarding/values-secret.yaml.example helm/member-onboarding/values-secret.yaml
#
# Verwendung:
#   helm install eegfaktura-member-onboarding ./helm/member-onboarding \
#     -f helm/member-onboarding/values-env.yaml \
#     -f helm/member-onboarding/values-secret.yaml

# ── Namespace ──────────────────────────────────────────────────────────────────
namespace: default
# ── Ingress ────────────────────────────────────────────────────────────────────
ingress:
  host: ""
  className: nginx
  proxyReadTimeout: "60"
  proxySendTimeout: "60"
  proxyBufferSize: "128k"
  proxyBuffersNumber: "4"
# ── Images ─────────────────────────────────────────────────────────────────────
images:
  backend:
    repository: ""
    tag: sha-611006b
    pullPolicy: IfNotPresent
  frontend:
    repository: ""
    tag: sha-611006b
    pullPolicy: IfNotPresent
# ── PostgreSQL ─────────────────────────────────────────────────────────────────
postgres:
  user: postgres
  database: member_onboarding
  storageClassName: standard
  storageSize: 5Gi
# ── Backend ────────────────────────────────────────────────────────────────────
backend:
  replicas: 1
  logLevel: "INFO" # DEBUG | INFO | WARN | ERROR
  corsAllowedOrigins: ""
  smtp:
    host: "" # leer = Mail deaktiviert (NoOpMailService)
    port: "587"
    user: "" # leer = kein SMTP-Auth (open relay)
    from: "" # Pflicht wenn smtp.host gesetzt
  # Keycloak JWT-Validierung — leer = Dev-Modus (kein Auth)
  keycloakJwksUrl: "" # z.B. https://keycloak.example.at/realms/EEGFaktura/protocol/openid-connect/certs
  keycloakIssuer: "" # z.B. https://keycloak.example.at/realms/EEGFaktura
# ── Seed data ──────────────────────────────────────────────────────────────────
seed:
  rcNumber: ""
  eegId: ""
# ── Frontend ───────────────────────────────────────────────────────────────────
frontend:
  replicas: 1
  logLevel: "info"
  backendUrl: ""
  # NextAuth / Keycloak — via values-env.yaml setzen
  nextauthUrl: "" # Öffentliche URL der App, z.B. https://member-onboarding.example.at
  keycloakIssuer: "" # z.B. https://keycloak.example.at/realms/EEGFaktura
  keycloakClientId: ""
# ── Secrets ────────────────────────────────────────────────────────────────────
# Niemals echte Werte hier eintragen — immer via values-secret.yaml übergeben.
secrets:
  postgresPassword: ""
  dbPassword: ""
  smtpPassword: ""
  # NextAuth session encryption key (generieren: openssl rand -base64 32)
  nextauthSecret: ""
  # Keycloak Client Secret
  keycloakClientSecret: ""

{{- if .Values.restart.enabled }}
---
# ServiceAccount used by the restart CronJob — minimal RBAC, namespace-scoped only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "member-onboarding.fullname" . }}-restarter
  namespace: {{ include "member-onboarding.namespace" . }}
  labels:
    {{- include "member-onboarding.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "member-onboarding.fullname" . }}-restarter
  namespace: {{ include "member-onboarding.namespace" . }}
  labels:
    {{- include "member-onboarding.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "member-onboarding.fullname" . }}-restarter
  namespace: {{ include "member-onboarding.namespace" . }}
  labels:
    {{- include "member-onboarding.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "member-onboarding.fullname" . }}-restarter
    namespace: {{ include "member-onboarding.namespace" . }}
roleRef:
  kind: Role
  name: {{ include "member-onboarding.fullname" . }}-restarter
  apiGroup: rbac.authorization.k8s.io
---
# CronJob: restarts backend + frontend pods on schedule so they pick up refreshed images.
# Default schedule: 1st of every month at 04:30 UTC (30 min after the GitHub Actions rebuild).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "member-onboarding.fullname" . }}-restarter
  namespace: {{ include "member-onboarding.namespace" . }}
  labels:
    {{- include "member-onboarding.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.restart.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: {{ include "member-onboarding.fullname" . }}-restarter
        spec:
          serviceAccountName: {{ include "member-onboarding.fullname" . }}-restarter
          restartPolicy: OnFailure
          containers:
            - name: kubectl
              image: {{ .Values.restart.kubectlImage | quote }}
              imagePullPolicy: IfNotPresent
              command:
                - kubectl
                - rollout
                - restart
                - deployment/{{ include "member-onboarding.fullname" . }}-backend
                - deployment/{{ include "member-onboarding.fullname" . }}-frontend
                - --namespace
                - {{ include "member-onboarding.namespace" . }}
{{- end }}

apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "member-onboarding.namespace" . }}
  labels:
    {{- include "member-onboarding.labels" . | nindent 4 }}
    # Pod-Security-Admission (K8s 1.25+) enforced auf restricted-Profil:
    # alle Workloads müssen runAsNonRoot + readOnlyRootFilesystem +
    # seccompProfile + drop-ALL haben. Audit + Warn liefern Diagnose-Logs,
    # falls jemand zukünftig ein nicht-konformes Manifest deployed.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted

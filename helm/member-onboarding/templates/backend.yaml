---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "member-onboarding.fullname" . }}-backend
  namespace: {{ include "member-onboarding.namespace" . }}
  labels:
    {{- include "member-onboarding.labels" . | nindent 4 }}
    app: {{ include "member-onboarding.fullname" . }}-backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: {{ include "member-onboarding.fullname" . }}-backend
  template:
    metadata:
      labels:
        app: {{ include "member-onboarding.fullname" . }}-backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: backend
          image: {{ .Values.images.backend.repository }}:{{ .Values.images.backend.tag }}
          imagePullPolicy: {{ .Values.images.backend.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: 9090
            {{- end }}
          env:
            - name: PORT
              value: "8080"
            - name: METRICS_PORT
              value: {{ if .Values.metrics.enabled }}"9090"{{ else }}""{{ end }}
            - name: LOG_LEVEL
              value: {{ .Values.backend.logLevel | quote }}
            - name: DB_HOST
              value: {{ include "member-onboarding.fullname" . }}-postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: {{ .Values.postgres.user | quote }}
            - name: DB_NAME
              value: {{ .Values.postgres.database | quote }}
            - name: DB_SSLMODE
              value: {{ .Values.backend.dbSslMode | quote }}
            - name: CORS_ALLOWED_ORIGINS
              value: {{ .Values.backend.corsAllowedOrigins | quote }}
            - name: KEYCLOAK_JWKS_URL
              value: {{ .Values.backend.keycloakJwksUrl | quote }}
            - name: KEYCLOAK_ISSUER
              value: {{ .Values.backend.keycloakIssuer | quote }}
            - name: SMTP_HOST
              value: {{ .Values.backend.smtp.host | quote }}
            - name: SMTP_PORT
              value: {{ .Values.backend.smtp.port | quote }}
            - name: SMTP_USER
              value: {{ .Values.backend.smtp.user | quote }}
            - name: SMTP_FROM
              value: {{ .Values.backend.smtp.from | quote }}
            - name: SMTP_FROM_NAME
              value: {{ .Values.backend.smtp.fromName | default "eegFaktura Mitglieder-Onboarding" | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "member-onboarding.fullname" . }}-backend-secret
                  key: DB_PASSWORD
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "member-onboarding.fullname" . }}-backend-secret
                  key: SMTP_PASSWORD
            - name: TURNSTILE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "member-onboarding.fullname" . }}-backend-secret
                  key: TURNSTILE_SECRET_KEY
            - name: CENTRAL_POLICY_TITLE
              value: {{ .Values.backend.centralPolicyTitle | quote }}
            - name: CENTRAL_POLICY_URL
              value: {{ .Values.backend.centralPolicyUrl | quote }}
            - name: CORE_BASE_URL
              value: {{ .Values.backend.coreBaseUrl | quote }}
            - name: CORE_GRAPHQL_URL
              value: {{ .Values.backend.coreGraphqlUrl | default "" | quote }}
            - name: CORE_TIMEOUT_SECONDS
              value: {{ .Values.backend.coreTimeoutSeconds | default 30 | quote }}
            - name: TRUSTED_PROXY_CIDRS
              value: {{ .Values.backend.trustedProxyCIDRs | default "" | quote }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          readinessProbe:
            # /readyz pings the DB — a transient outage drops the pod from
            # the Service endpoints (no restart, no cascading downtime).
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            # /livez never touches the DB. A Postgres blip must NOT trigger
            # a livenessProbe restart loop.
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "member-onboarding.fullname" . }}-backend
  namespace: {{ include "member-onboarding.namespace" . }}
  labels:
    {{- include "member-onboarding.labels" . | nindent 4 }}
    app: {{ include "member-onboarding.fullname" . }}-backend
spec:
  selector:
    app: {{ include "member-onboarding.fullname" . }}-backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
{{- if .Values.metrics.enabled }}
---
# Dedicated ClusterIP service exposing only /metrics on port 9090. NOT
# routed through the public ingress — only the in-cluster Prometheus pod
# should scrape this. Annotated for Prometheus' kubernetes_sd_configs in
# case no ServiceMonitor CRD is in use.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "member-onboarding.fullname" . }}-backend-metrics
  namespace: {{ include "member-onboarding.namespace" . }}
  labels:
    {{- include "member-onboarding.labels" . | nindent 4 }}
    app: {{ include "member-onboarding.fullname" . }}-backend
    eegfaktura.at/metrics: "true"
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app: {{ include "member-onboarding.fullname" . }}-backend
  ports:
    - name: metrics
      port: 9090
      targetPort: 9090
{{- if .Values.metrics.serviceMonitor.enabled }}
---
# ServiceMonitor for prometheus-operator-based stacks (kube-prometheus-stack,
# Rancher Monitoring). Skipped when the operator CRD is not installed
# (set metrics.serviceMonitor.enabled=false).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "member-onboarding.fullname" . }}-backend
  namespace: {{ include "member-onboarding.namespace" . }}
  labels:
    {{- include "member-onboarding.labels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      eegfaktura.at/metrics: "true"
  namespaceSelector:
    matchNames:
      - {{ include "member-onboarding.namespace" . }}
  endpoints:
    - port: metrics
      interval: {{ .Values.metrics.serviceMonitor.interval | default "30s" }}
      path: /metrics
{{- end }}
{{- end }}

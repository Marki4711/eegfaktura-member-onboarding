---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "member-onboarding.fullname" . }}-backend
  namespace: {{ include "member-onboarding.namespace" . }}
  labels:
    {{- include "member-onboarding.labels" . | nindent 4 }}
    app: {{ include "member-onboarding.fullname" . }}-backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: {{ include "member-onboarding.fullname" . }}-backend
  template:
    metadata:
      labels:
        app: {{ include "member-onboarding.fullname" . }}-backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: backend
          image: {{ .Values.images.backend.repository }}:{{ .Values.images.backend.tag }}
          imagePullPolicy: {{ .Values.images.backend.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: LOG_LEVEL
              value: {{ .Values.backend.logLevel | quote }}
            - name: DB_HOST
              value: {{ include "member-onboarding.fullname" . }}-postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: {{ .Values.postgres.user | quote }}
            - name: DB_NAME
              value: {{ .Values.postgres.database | quote }}
            - name: DB_SSLMODE
              value: {{ .Values.backend.dbSslMode | quote }}
            - name: CORS_ALLOWED_ORIGINS
              value: {{ .Values.backend.corsAllowedOrigins | quote }}
            - name: KEYCLOAK_JWKS_URL
              value: {{ .Values.backend.keycloakJwksUrl | quote }}
            - name: KEYCLOAK_ISSUER
              value: {{ .Values.backend.keycloakIssuer | quote }}
            - name: SMTP_HOST
              value: {{ .Values.backend.smtp.host | quote }}
            - name: SMTP_PORT
              value: {{ .Values.backend.smtp.port | quote }}
            - name: SMTP_USER
              value: {{ .Values.backend.smtp.user | quote }}
            - name: SMTP_FROM
              value: {{ .Values.backend.smtp.from | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "member-onboarding.fullname" . }}-backend-secret
                  key: DB_PASSWORD
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "member-onboarding.fullname" . }}-backend-secret
                  key: SMTP_PASSWORD
            - name: TURNSTILE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "member-onboarding.fullname" . }}-backend-secret
                  key: TURNSTILE_SECRET_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "member-onboarding.fullname" . }}-backend
  namespace: {{ include "member-onboarding.namespace" . }}
  labels:
    {{- include "member-onboarding.labels" . | nindent 4 }}
    app: {{ include "member-onboarding.fullname" . }}-backend
spec:
  selector:
    app: {{ include "member-onboarding.fullname" . }}-backend
  ports:
    - port: 8080
      targetPort: 8080

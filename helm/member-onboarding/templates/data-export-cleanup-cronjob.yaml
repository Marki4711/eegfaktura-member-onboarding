{{- if .Values.dataExportCleanup.enabled }}
---
# PROJ-60: K8s-CronJob for the data-export cleanup tasks.
#   1. Zombie-Recovery — running jobs older than 1h → failed (with retry_count++)
#   2. BLOB-TTL — data_export_result rows past expires_at → deleted,
#      job marked 'expired'
#   3. Config-Hard-Delete — soft-deleted configs older than ~7 years
#      → hard-deleted (DSGVO § 132 BAO)
#
# Runs as a subcommand of the existing backend image (`backend data-export-cleanup`)
# so we don't ship a separate container.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "member-onboarding.fullname" . }}-data-export-cleanup
  namespace: {{ include "member-onboarding.namespace" . }}
  labels:
    {{- include "member-onboarding.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.dataExportCleanup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: {{ include "member-onboarding.fullname" . }}-data-export-cleanup
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          restartPolicy: OnFailure
          containers:
            - name: cleanup
              image: {{ .Values.images.backend.repository }}:{{ .Values.images.backend.tag }}
              imagePullPolicy: {{ .Values.images.backend.pullPolicy }}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              args: ["data-export-cleanup"]
              env:
                - name: LOG_LEVEL
                  value: {{ .Values.backend.logLevel | quote }}
                - name: DB_HOST
                  value: {{ include "member-onboarding.fullname" . }}-postgres
                - name: DB_PORT
                  value: "5432"
                - name: DB_USER
                  value: {{ .Values.postgres.user | quote }}
                - name: DB_NAME
                  value: {{ .Values.postgres.database | quote }}
                - name: DB_SSLMODE
                  value: {{ .Values.backend.dbSslMode | quote }}
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "member-onboarding.fullname" . }}-backend-secret
                      key: DB_PASSWORD
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
{{- end }}

apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "member-onboarding.fullname" . }}-seed
  namespace: {{ include "member-onboarding.namespace" . }}
  labels:
    {{- include "member-onboarding.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        # Used by the postgres NetworkPolicy so the seed pod can reach the DB.
        app: {{ include "member-onboarding.fullname" . }}-seed
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command: ['sh', '-c',
            'until pg_isready -h {{ include "member-onboarding.fullname" . }}-postgres -p 5432 -U {{ .Values.postgres.user }}; do
               echo "waiting for postgres..."; sleep 2;
             done']
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: seed
          image: postgres:16-alpine
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # SQL-Werte aus values.yaml werden NICHT mehr in den Heredoc
          # interpoliert (vorher: ein `'` in `seed.eegId` hätte den
          # SQL-Literal-Block ausbrechen können). Stattdessen kommen sie
          # als Env-Vars rein, werden via psql-`\set` zu Variablen und mit
          # `:'name'`-Notation safe quoted.
          command: ["/bin/sh", "-c"]
          args:
            - |
              psql -v ON_ERROR_STOP=1 \
                   -v rc="$SEED_RC_NUMBER" \
                   -v eeg="$SEED_EEG_ID" \
                   "postgres://{{ .Values.postgres.user }}:${DB_PASSWORD}@{{ include "member-onboarding.fullname" . }}-postgres:5432/{{ .Values.postgres.database }}?sslmode={{ .Values.backend.dbSslMode }}" <<'SQL'
              INSERT INTO member_onboarding.registration_entrypoint (eeg_id, rc_number, is_active)
              VALUES (:'eeg', :'rc', TRUE)
              ON CONFLICT (rc_number) DO NOTHING;
              SQL
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "member-onboarding.fullname" . }}-backend-secret
                  key: DB_PASSWORD
            - name: SEED_RC_NUMBER
              value: {{ .Values.seed.rcNumber | quote }}
            - name: SEED_EEG_ID
              value: {{ .Values.seed.eegId | quote }}
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi

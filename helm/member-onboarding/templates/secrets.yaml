{{- $required := list "postgresPassword" "dbPassword" "nextauthSecret" "keycloakClientSecret" -}}
{{- range $required -}}
  {{- $val := index $.Values.secrets . -}}
  {{- if or (eq $val "FILL_IN") (eq $val "") -}}
    {{- fail (printf "secrets.%s must be set to a real value (currently %q). Copy values-secret.yaml.example and fill in all required secrets." . $val) -}}
  {{- end -}}
{{- end -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "member-onboarding.fullname" . }}-postgres-secret
  namespace: {{ include "member-onboarding.namespace" . }}
  labels:
    {{- include "member-onboarding.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "member-onboarding.fullname" . }}-backend-secret
  namespace: {{ include "member-onboarding.namespace" . }}
  labels:
    {{- include "member-onboarding.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_PASSWORD: {{ .Values.secrets.dbPassword | quote }}
  SMTP_PASSWORD: {{ .Values.secrets.smtpPassword | quote }}
  TURNSTILE_SECRET_KEY: {{ .Values.secrets.turnstileSecretKey | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "member-onboarding.fullname" . }}-frontend-secret
  namespace: {{ include "member-onboarding.namespace" . }}
  labels:
    {{- include "member-onboarding.labels" . | nindent 4 }}
type: Opaque
stringData:
  NEXTAUTH_SECRET: {{ .Values.secrets.nextauthSecret | quote }}
  KEYCLOAK_CLIENT_SECRET: {{ .Values.secrets.keycloakClientSecret | quote }}

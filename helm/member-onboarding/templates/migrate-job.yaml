apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "member-onboarding.fullname" . }}-migrate
  namespace: {{ include "member-onboarding.namespace" . }}
  labels:
    {{- include "member-onboarding.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command: ['sh', '-c',
            'until pg_isready -h {{ include "member-onboarding.fullname" . }}-postgres -p 5432 -U {{ .Values.postgres.user }}; do
               echo "waiting for postgres..."; sleep 2;
             done']
      containers:
        - name: migrate
          image: {{ .Values.images.backend.repository }}:{{ .Values.images.backend.tag }}
          imagePullPolicy: {{ .Values.images.backend.pullPolicy }}
          workingDir: /app
          command: ["/bin/sh", "-c"]
          args:
            - |
              DATABASE_URL="postgres://{{ .Values.postgres.user }}:${DB_PASSWORD}@{{ include "member-onboarding.fullname" . }}-postgres:5432/{{ .Values.postgres.database }}?sslmode=disable" \
              /app/migrate -direction up
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "member-onboarding.fullname" . }}-backend-secret
                  key: DB_PASSWORD

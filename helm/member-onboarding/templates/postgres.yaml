---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "member-onboarding.fullname" . }}-postgres
  namespace: {{ include "member-onboarding.namespace" . }}
  labels:
    {{- include "member-onboarding.labels" . | nindent 4 }}
    app: {{ include "member-onboarding.fullname" . }}-postgres
spec:
  serviceName: {{ include "member-onboarding.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "member-onboarding.fullname" . }}-postgres
  template:
    metadata:
      labels:
        app: {{ include "member-onboarding.fullname" . }}-postgres
      annotations:
        # Velero Pre-Backup-Hook: erzwingt einen Postgres-CHECKPOINT vor dem
        # CSI-Volume-Snapshot, damit das Backup vom konsistenten On-Disk-Zustand
        # genommen wird (statt aus dem laufenden Heap recovern zu müssen).
        # Pendant zum Cluster-Standard-Pattern; entsprechend bringt jeder
        # daily/weekly Velero-Backup-Lauf das DB-Volume in einen sauberen Zustand.
        pre.hook.backup.velero.io/container: postgres
        pre.hook.backup.velero.io/command: >-
          ["/bin/sh","-c","PGPASSWORD=\"$POSTGRES_PASSWORD\" psql -U {{ .Values.postgres.user }} -d {{ .Values.postgres.database }} -c CHECKPOINT;"]
        pre.hook.backup.velero.io/timeout: 60s
    spec:
      # 60 s gibt Postgres genug Zeit für "smart" shutdown (Connections
      # zu Ende abarbeiten, dann sauberer Checkpoint vor SIGKILL). Default
      # 30 s wäre zu knapp und kann zu inkonsistenten WAL-Zuständen führen.
      terminationGracePeriodSeconds: 60
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "member-onboarding.fullname" . }}-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.user | quote }}
                - -d
                - {{ .Values.postgres.database | quote }}
            initialDelaySeconds: 5
            periodSeconds: 5
          # Liveness restartet hängende Postgres-Prozesse (Kernel-OOM,
          # Disk-Full, Connection-Pool-Exhaustion). Höheres failureThreshold
          # als readiness, weil ein kurzzeitig überlasteter Postgres nicht
          # gleich neugestartet werden soll.
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.user | quote }}
                - -d
                - {{ .Values.postgres.database | quote }}
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: {{ .Values.postgres.storageClassName | quote }}
        resources:
          requests:
            storage: {{ .Values.postgres.storageSize | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "member-onboarding.fullname" . }}-postgres
  namespace: {{ include "member-onboarding.namespace" . }}
  labels:
    {{- include "member-onboarding.labels" . | nindent 4 }}
    app: {{ include "member-onboarding.fullname" . }}-postgres
spec:
  selector:
    app: {{ include "member-onboarding.fullname" . }}-postgres
  ports:
    - port: 5432
      targetPort: 5432

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "member-onboarding.fullname" . }}-frontend
  namespace: {{ include "member-onboarding.namespace" . }}
  labels:
    {{- include "member-onboarding.labels" . | nindent 4 }}
    app: {{ include "member-onboarding.fullname" . }}-frontend
spec:
  replicas: {{ .Values.frontend.replicas | default 1 }}
  selector:
    matchLabels:
      app: {{ include "member-onboarding.fullname" . }}-frontend
  template:
    metadata:
      labels:
        app: {{ include "member-onboarding.fullname" . }}-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: frontend
          image: {{ .Values.images.frontend.repository }}:{{ .Values.images.frontend.tag }}
          imagePullPolicy: {{ .Values.images.frontend.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: LOG_LEVEL
              value: {{ .Values.frontend.logLevel | default "info" | quote }}
            - name: BACKEND_URL
              value: {{ .Values.frontend.backendUrl | quote }}
            - name: NEXTAUTH_URL
              value: {{ .Values.frontend.nextauthUrl | quote }}
            - name: KEYCLOAK_ISSUER
              value: {{ .Values.frontend.keycloakIssuer | quote }}
            - name: KEYCLOAK_CLIENT_ID
              value: {{ .Values.frontend.keycloakClientId | quote }}
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "member-onboarding.fullname" . }}-frontend-secret
                  key: NEXTAUTH_SECRET
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "member-onboarding.fullname" . }}-frontend-secret
                  key: KEYCLOAK_CLIENT_SECRET
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "member-onboarding.fullname" . }}-frontend
  namespace: {{ include "member-onboarding.namespace" . }}
  labels:
    {{- include "member-onboarding.labels" . | nindent 4 }}
    app: {{ include "member-onboarding.fullname" . }}-frontend
spec:
  selector:
    app: {{ include "member-onboarding.fullname" . }}-frontend
  ports:
    - port: 3000
      targetPort: 3000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "member-onboarding.fullname" . }}-frontend
  namespace: {{ include "member-onboarding.namespace" . }}
  labels:
    {{- include "member-onboarding.labels" . | nindent 4 }}
    app: {{ include "member-onboarding.fullname" . }}-frontend
spec:
  replicas: {{ .Values.frontend.replicas | default 1 }}
  selector:
    matchLabels:
      app: {{ include "member-onboarding.fullname" . }}-frontend
  template:
    metadata:
      labels:
        app: {{ include "member-onboarding.fullname" . }}-frontend
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: {{ .Values.images.frontend.repository }}:{{ .Values.images.frontend.tag }}
          imagePullPolicy: {{ .Values.images.frontend.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            # Next.js Standalone schreibt nur in /tmp (Hot-Module-Replacement
            # ist im prod-Build deaktiviert, .next ist im Image read-only).
            - name: tmp
              mountPath: /tmp
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: LOG_LEVEL
              value: {{ .Values.frontend.logLevel | default "info" | quote }}
            - name: BACKEND_URL
              value: {{ .Values.frontend.backendUrl | quote }}
            - name: NEXTAUTH_URL
              value: {{ .Values.frontend.nextauthUrl | quote }}
            - name: KEYCLOAK_ISSUER
              value: {{ .Values.frontend.keycloakIssuer | quote }}
            - name: KEYCLOAK_CLIENT_ID
              value: {{ .Values.frontend.keycloakClientId | quote }}
            # CORE_AUTH_MODE=exchange: the silent-SSO bootstrap is mounted
            # in the admin server-layout, which reads these env vars at
            # runtime and passes them as props to the client component.
            # No NEXT_PUBLIC_ prefix — those would be baked at build time
            # and a helm-only toggle would have no effect on a deployed
            # image. KEYCLOAK_ISSUER is reused from the existing variable
            # above; only the two below are auth-mode specific.
            - name: CORE_AUTH_MODE
              value: {{ .Values.frontend.coreAuthMode | default "direct" | quote }}
            - name: KEYCLOAK_CORE_CLIENT_ID
              value: {{ .Values.frontend.keycloakCoreClientId | default "" | quote }}
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "member-onboarding.fullname" . }}-frontend-secret
                  key: NEXTAUTH_SECRET
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "member-onboarding.fullname" . }}-frontend-secret
                  key: KEYCLOAK_CLIENT_SECRET
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          readinessProbe:
            # /api/health returns 200 unconditionally — does NOT render the
            # public landing page and does NOT call the backend. A backend
            # outage will no longer cascade into frontend pod NotReady.
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          # Next.js Cold-Start kann 10-20 s dauern (Standalone-Bundle laden,
          # NextAuth-Init, KEYCLOAK-JWKS-Fetch). Ohne startupProbe würde
          # livenessProbe ggf. killen, bevor App ready ist.
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            failureThreshold: 30
            periodSeconds: 2
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "member-onboarding.fullname" . }}-frontend
  namespace: {{ include "member-onboarding.namespace" . }}
  labels:
    {{- include "member-onboarding.labels" . | nindent 4 }}
    app: {{ include "member-onboarding.fullname" . }}-frontend
spec:
  selector:
    app: {{ include "member-onboarding.fullname" . }}-frontend
  ports:
    - port: 3000
      targetPort: 3000

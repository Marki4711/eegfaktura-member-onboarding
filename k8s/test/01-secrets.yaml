# Fill in the SAME password in both secrets before applying.
# postgres-secret  — used by the PostgreSQL StatefulSet
# backend-secret   — used by the backend Deployment, migrate Job, and seed Job
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: eegfaktura-member-onboarding-test
type: Opaque
stringData:
  POSTGRES_PASSWORD: "<FILL_IN>"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: eegfaktura-member-onboarding-test
type: Opaque
stringData:
  DB_PASSWORD: "<FILL_IN>"   # same value as POSTGRES_PASSWORD above

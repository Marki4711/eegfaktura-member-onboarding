# NOTE: NEXT_PUBLIC_API_URL is baked into the image at build time.
# The :latest image is built with NEXT_PUBLIC_API_URL="" (GitHub variable unset),
# so the browser makes relative /api/... requests — routed by the ingress below.
# No env var override is needed in this pod spec.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: eegfaktura-member-onboarding-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: marki4711/eegfaktura-member-onboarding-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: eegfaktura-member-onboarding-test
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000

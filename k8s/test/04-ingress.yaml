# TLS: either use cert-manager (add annotation below) or create the secret manually.
# cert-manager example annotation:
#   cert-manager.io/cluster-issuer: letsencrypt-prod
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: member-onboarding-test
  namespace: eegfaktura-member-onboarding-test
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # Uncomment if cert-manager is available on this cluster:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - member-onboarding-test.eegfaktura.at
      secretName: member-onboarding-test-tls   # <FILL_IN>: created by cert-manager or manually
  rules:
    - host: member-onboarding-test.eegfaktura.at
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000

# PostgreSQL password — fill in before applying
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: eegfaktura-member-onboarding-test
type: Opaque
stringData:
  POSTGRES_PASSWORD: "<FILL_IN>"   # choose a strong password
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: eegfaktura-member-onboarding-test
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_DB
              value: member_onboarding
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: [pg_isready, -U, postgres, -d, member_onboarding]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: "csi-rbd-sc"
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: eegfaktura-member-onboarding-test
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

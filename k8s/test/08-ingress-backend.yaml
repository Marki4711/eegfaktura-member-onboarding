# Routes all /api/* requests to the backend unchanged.
# The backend registers routes under /api/public/... and /api/admin/...
# so no path rewriting is applied.
#
# Note: /health (the backend's internal health check) is not exposed via
# this ingress. It is only reachable via kubectl port-forward.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: member-onboarding-test-backend
  namespace: eegfaktura-member-onboarding-test
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: member-onboarding-test.eegfaktura.at
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080

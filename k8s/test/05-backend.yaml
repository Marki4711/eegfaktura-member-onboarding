apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: eegfaktura-member-onboarding-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: marki4711/eegfaktura-member-onboarding-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: postgres
            - name: DB_NAME
              value: member_onboarding
            - name: DB_SSLMODE
              value: disable
            - name: CORS_ALLOWED_ORIGINS
              value: "https://member-onboarding-test.eegfaktura.at"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: eegfaktura-member-onboarding-test
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080

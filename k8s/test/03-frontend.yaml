# NOTE: NEXT_PUBLIC_API_URL is baked into the image at build time.
# The image 37289bd was built with NEXT_PUBLIC_API_URL="" (empty), so
# the frontend makes relative /api/... requests — which the ingress below
# routes to the backend. No env var override is needed here.
# If the image was built with a different URL, rebuild it via GitHub Actions
# with vars.NEXT_PUBLIC_API_URL unset or set to empty string.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: eegfaktura-member-onboarding-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: marki4711/eegfaktura-member-onboarding-frontend:37289bd
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: eegfaktura-member-onboarding-test
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000

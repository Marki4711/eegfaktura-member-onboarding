host: member-onboarding.eegfaktura.at
info:
  contact: {}
  description: |-
    REST API for EEG (Energiegemeinschaft) member self-service registration and admin review.

    **Auth schemes:**
    - **Public** endpoints (`/api/public/*`): no auth required. Rate-limited + optional Turnstile CAPTCHA.
    - **Admin** endpoints (`/api/admin/*`): Keycloak Bearer JWT (`Authorization: Bearer <token>`).
    - **External** endpoints (`/api/external/*`): API key (`Authorization: Bearer moak_<key>`).
  title: eegfaktura Member Onboarding API
  version: "1.0"
paths:
  /api/admin/applications:
    get:
      description: Returns a paginated, filterable list of member applications. Tenant-admins
        only see their own EEG's applications; superusers see all.
      parameters:
      - description: Filter by status (draft|submitted|under_review|needs_info|approved|rejected|imported|import_failed)
        in: query
        name: status
        type: string
      - description: Filter by reference number (partial match)
        in: query
        name: reference_number
        type: string
      - description: Filter by member lastname (partial match)
        in: query
        name: lastname
        type: string
      - description: Filter by email (partial match)
        in: query
        name: email
        type: string
      - description: Filter by metering point ID
        in: query
        name: metering_point
        type: string
      - description: Filter by RC number (superuser only)
        in: query
        name: rc_number
        type: string
      - description: Filter by submission date from (RFC3339)
        in: query
        name: submitted_from
        type: string
      - description: Filter by submission date to (RFC3339)
        in: query
        name: submitted_to
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 20)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/shared.ApplicationListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List applications
      tags:
      - Admin
  /api/admin/applications/{id}:
    delete:
      description: Permanently deletes an application and all its metering points
        and status log entries.
      parameters:
      - description: Application UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: Application deleted
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete application
      tags:
      - Admin
    get:
      description: Returns full application data including metering points, status
        log, and document consents.
      parameters:
      - description: Application UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/shared.AdminApplicationDetailResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "403":
          description: Tenant mismatch
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get application detail
      tags:
      - Admin
    put:
      consumes:
      - application/json
      description: Allows admins to correct application data. All fields are optional;
        only provided fields are updated.
      parameters:
      - description: Application UUID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/shared.AdminUpdateApplicationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/shared.AdminApplicationDetailResponse'
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "403":
          description: Tenant mismatch
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update application (admin)
      tags:
      - Admin
  /api/admin/applications/{id}/export/excel:
    get:
      description: Downloads an Excel file (.xlsx) with the full application data
        formatted for eegFaktura import.
      parameters:
      - description: Application UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      responses:
        "200":
          description: Excel file
          schema:
            type: file
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Export application as Excel
      tags:
      - Admin
  /api/admin/applications/{id}/resend-confirmation:
    post:
      description: Resends the submission confirmation email to the member. Useful
        when the original email was not received.
      parameters:
      - description: Application UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: Email resent
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Resend member confirmation email
      tags:
      - Admin
  /api/admin/applications/{id}/status:
    post:
      consumes:
      - application/json
      description: Transitions the application to a new status. Only allowed transitions
        are accepted (see status model). Triggers email notifications for approved/rejected.
      parameters:
      - description: Application UUID
        in: path
        name: id
        required: true
        type: string
      - description: Target status and optional reason
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/shared.ChangeStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/shared.ChangeStatusResponse'
        "400":
          description: Unknown status value
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "403":
          description: Tenant mismatch
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "409":
          description: Invalid status transition
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Change application status
      tags:
      - Admin
  /api/admin/applications/drafts:
    delete:
      description: Deletes all applications in status `draft` for the calling admin's
        EEGs. Superusers delete all drafts across all EEGs.
      produces:
      - application/json
      responses:
        "200":
          description: deleted count
          schema:
            additionalProperties:
              type: integer
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete all draft applications
      tags:
      - Admin
  /api/external/v1/applications:
    post:
      consumes:
      - application/json
      description: Creates and immediately submits a member application in a single
        request. Intended for ERP/third-party integrations. The EEG RC number is derived
        from the API key — no rc_number field in the body.
      parameters:
      - description: Member application data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/http.externalApplicationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: id and referenceNumber of the created application
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: RC number not found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "409":
          description: Duplicate metering point
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "410":
          description: Registration deactivated
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Submit application (external)
      tags:
      - External
  /api/public/applications:
    post:
      consumes:
      - application/json
      description: Creates a new member application in status `draft`. Rate-limited
        (10 req/10 min per IP). Protected by Cloudflare Turnstile when configured.
      parameters:
      - description: Application data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/shared.CreateApplicationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/shared.ApplicationResponse'
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "409":
          description: Duplicate metering point
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "410":
          description: Registration deactivated
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "422":
          description: Turnstile verification failed
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Create application draft
      tags:
      - Public
  /api/public/applications/{id}:
    put:
      consumes:
      - application/json
      description: Updates a member application in status `draft`. Only drafts can
        be updated; submitted applications return 409.
      parameters:
      - description: Application UUID
        in: path
        name: id
        required: true
        type: string
      - description: Updated application data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/shared.UpdateApplicationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/shared.ApplicationResponse'
        "400":
          description: Validation error or invalid UUID
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "404":
          description: Application not found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "409":
          description: Application already submitted
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Update application draft
      tags:
      - Public
  /api/public/applications/{id}/submit:
    post:
      consumes:
      - application/json
      description: Transitions the application from `draft` to `submitted`. Triggers
        confirmation email to the member. Consents for legal documents can be passed
        in the request body.
      parameters:
      - description: Application UUID
        in: path
        name: id
        required: true
        type: string
      - description: Optional legal document consents
        in: body
        name: body
        schema:
          $ref: '#/definitions/shared.SubmitRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/shared.SubmitResponse'
        "400":
          description: Invalid UUID
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "404":
          description: Application not found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "409":
          description: Invalid status transition
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Submit application
      tags:
      - Public
  /api/public/registration/{rc_number}:
    get:
      description: 'Returns EEG-specific configuration for the public registration
        form: field visibility, legal documents, intro text, SEPA settings.'
      parameters:
      - description: EEG registration code (e.g. RC123456)
        in: path
        name: rc_number
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/shared.RegistrationConfig'
        "404":
          description: RC number unknown
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "410":
          description: Registration deactivated for this EEG
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Get registration config
      tags:
      - Public
  /health:
    get:
      description: Returns `{"status":"ok"}` when the service and database are reachable.
        Returns 503 when the database is unavailable.
      produces:
      - application/json
      responses:
        "200":
          description: 'status: ok'
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: 'status: degraded'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - System
schemes:
- https
securityDefinitions:
  ApiKeyAuth:
    description: 'EEG API key. Format: "Bearer moak_<key>"'
    in: header
    name: Authorization
    type: apiKey
  BearerAuth:
    description: 'Keycloak JWT. Format: "Bearer <token>"'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"

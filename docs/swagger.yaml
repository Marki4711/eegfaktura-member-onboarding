      tags:
      - Admin
  /api/admin/applications/{id}/resend-email-confirmation:
    post:
      description: Rotates the confirmation token and re-sends the member confirmation
        mail with a fresh link. Throttled to one resend every 5 minutes per application.
      parameters:
      - description: Application UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: Email resent
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "409":
          description: Throttled, wrong status, or EEG opt-out
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Resend e-mail confirmation link (PROJ-31)
      tags:
      - Admin
  /api/admin/applications/{id}/reset-import:
    post:
      consumes:
      - application/json
      description: Transitions an application from `imported` back to `approved` so
        it can be re-imported after the eegFaktura admin deleted the participant in
        the core. Clears `target_participant_id` and all `import_*` bookkeeping fields.
        A reason is mandatory and recorded in the status_log; the previous `target_participant_id`
        is archived in the same log entry. The eegFaktura core is NOT contacted —
        admin verifies the deletion manually.
      parameters:
      - description: Application UUID
        in: path
        name: id
        required: true
        type: string
      - description: Reason for the reset
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ResetImportRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.AdminApplicationDetailResponse'
        "400":
          description: Validation failed
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "403":
          description: Tenant mismatch
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "409":
          description: Application not in imported status
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Reset an imported application back to approved (PROJ-30)
      tags:
      - Admin
  /api/admin/applications/{id}/status:
    post:
      consumes:
      - application/json
      description: Transitions the application to a new status. Only allowed transitions
        are accepted (see status model). Triggers email notifications for approved/rejected.
      parameters:
      - description: Application UUID
        in: path
        name: id
        required: true
        type: string
      - description: Target status and optional reason
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ChangeStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ChangeStatusResponse'
        "400":
          description: Unknown status value
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "403":
          description: Tenant mismatch
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "409":
          description: Invalid status transition
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Change application status
      tags:
      - Admin
  /api/admin/applications/bulk-action:
    post:
      consumes:
      - application/json
      description: Applies a status transition to multiple applications in one request.
        Applications with invalid transitions or mismatching tenant are skipped without
        error.
      parameters:
      - description: Bulk action payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.BulkActionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.BulkActionResponse'
        "400":

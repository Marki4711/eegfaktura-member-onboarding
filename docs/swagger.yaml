        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "503":
          description: Core not configured or unreachable
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Compare local EEG master data with the eegFaktura core (PROJ-32)
      tags:
      - Admin
  /api/admin/settings/eeg/logo:
    get:
      description: Returns the BYTEA logo bytes pulled from the eegFaktura-billing
        service on the last successful sync, with the correct Content-Type. 404 when
        no logo has been synced yet (or the EEG has no logo configured).
      parameters:
      - description: RC number
        in: query
        name: rc_number
        required: true
        type: string
      produces:
      - image/png
      - image/jpeg
      - image/gif
      responses:
        "200":
          description: OK
          schema:
            type: file
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "404":
          description: No logo synced yet
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Serve the cached EEG logo for inline preview (PROJ-33)
      tags:
      - Admin
  /api/admin/settings/eeg/sync:
    post:
      description: Fetches the latest EEG master data from the core via GraphQL and
        writes the synced columns on registration_entrypoint. Stamps last_synced_from_core_at.
        The synced fields (name, address, creditor-id, contact-email) are not user-editable
        elsewhere.
      parameters:
      - description: RC number
        in: query
        name: rc_number
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.EEGSettingsComparisonResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "502":
          description: Core returned an error
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "503":
          description: Core not configured
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Pull EEG master data from the eegFaktura core (PROJ-32)
      tags:
      - Admin
  /api/admin/tariffs:
    get:
      description: Proxies the eegFaktura core's GET /eeg/tariff for the import-time
        tariff selection dialog. The admin's bearer token is forwarded; tenant isolation
        is enforced via the rcNumber query parameter (must be in the JWT's Tenants
        claim, or caller must be superuser).
      parameters:
      - description: EEG RC number
        in: query
        name: rcNumber
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: '{ tariffs: [...] }'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: rcNumber missing
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "403":
          description: Tenant mismatch
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "503":
          description: Core service unavailable
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List tariffs available for an EEG (PROJ-27)
      tags:
      - Admin
  /api/external/v1/applications:
    post:
      consumes:
      - application/json
      description: Creates and immediately submits a member application in a single
        request. Intended for ERP/third-party integrations. The EEG RC number is derived
        from the API key — no rc_number field in the body.
      parameters:
      - description: Member application data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_http.externalApplicationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: id and referenceNumber of the created application
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: RC number not found
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "409":
          description: Duplicate metering point
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "410":
          description: Registration deactivated
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Submit application (external)
      tags:
      - External
  /api/public/applications:
    post:
      consumes:
      - application/json
      description: Creates a new member application in status `draft`. Rate-limited
        (10 req/10 min per IP). Protected by Cloudflare Turnstile when configured.
      parameters:
      - description: Application data

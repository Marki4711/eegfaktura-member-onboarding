      responses:
        "200":
          description: 'status: ok'
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: 'status: degraded'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check (legacy combined)
      tags:
      - System
  /livez:
    get:
      description: Always returns 200 once the HTTP server is up. Intended for K8s
        livenessProbe.
      produces:
      - application/json
      responses:
        "200":
          description: 'status: alive'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Liveness probe
      tags:
      - System
  /readyz:
    get:
      description: Returns 200 when the service is ready to serve traffic (DB reachable).
        503 otherwise.
      produces:
      - application/json
      responses:
        "200":
          description: 'status: ready'
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: 'status: not_ready'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Readiness probe
      tags:
      - System
schemes:
- https

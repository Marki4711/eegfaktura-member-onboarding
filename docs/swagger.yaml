        type: string
      - description: Target RC + reason
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ReassignEEGRequest'
      produces:
      - application/json
      responses:
        "200":

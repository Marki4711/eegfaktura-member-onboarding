basePath: /
definitions:
  github_com_your-org_eegfaktura-member-onboarding_internal_importing.ActivationCheckResult:
    properties:
      activated:
        type: integer
      checked:
        type: integer
      errors:
        items:
          type: string
        type: array
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.AdminApplicationDetailResponse:
    properties:
      accountHolder:
        type: string
      accuracyConfirmed:
        type: boolean
      activatedAt:
        type: string
      adminNote:
        type: string
      approvedAt:
        type: string
      bankConfirmedAt:
        description: |-
          PROJ-46: Audit-Timestamps für die Stati nach dem Import.
          BankConfirmedAt wird gesetzt beim Übergang awaiting_bank_confirmation →
          ready_for_activation (Admin manuell). ActivatedAt beim Übergang
          ready_for_activation → activated (Admin manuell oder Activation-Check).
        type: string
      bankName:
        type: string
      birthDate:
        type: string
      companyName:
        type: string
      consents:
        items:
          $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.DocumentConsentView'
        type: array
      cooperativeRequiredShares:
        type: integer
      cooperativeShareAmountCents:
        type: integer
      cooperativeSharesCount:
        description: |-
          PROJ-37: Anzahl gezeichneter Genossenschaftsanteile. NULL bei
          EEGs ohne aktivierte Anteils-Erfassung; sonst > 0 (Submit-Validierung
          erzwingt >= entrypoint.cooperative_required_shares).
        type: integer
      cooperativeSharesEnabled:
        description: |-
          CooperativeSharesEnabled (PROJ-37) mirrors the EEG-level toggle so
          the admin detail can render the shares block when relevant. The
          matching two value fields (required / amount-per-share) come from
          the entrypoint and are joined in at detail-build time.
        type: boolean
      createdAt:
        type: string
      einzugsart:
        type: string
      electricHotWater:
        type: boolean
      electricVehicle:
        type: boolean
      electricVehicleAnnualKm:
        type: integer
      electricVehicleCount:
        description: |-
          PROJ-42: Detail-Erfassung — nur relevant wenn ElectricVehicle == true.
          Service-Layer clearet beide auf NULL falls electric_vehicle nicht gesetzt.
        type: integer
      email:
        type: string
      emailConfirmationPending:
        description: |-
          EmailConfirmationPending is a derived, non-persistent flag set by the
          repository after load: true when a confirmation token is still active
          and the member has not yet clicked it. Lets the admin UI render the
          "⏳ unbestätigt" badge without re-deriving from internal columns.
        type: boolean
      emailConfirmedAt:
        description: |-
          E-Mail-Bestätigung (PROJ-31). Token-Hash + Expiry sind interne Felder
          und werden nicht in API-Responses serialisiert (JSON-Tag "-").
        type: string
      firstname:
        type: string
      heatPump:
        type: boolean
      iban:
        type: string
      id:
        type: string
      importErrorMessage:
        type: string
      importFinishedAt:
        type: string
      importStartedAt:
        type: string
      importStuck:
        description: |-
          ImportStuck (PROJ-34) is true when the application is in
          status='approved' with import_started_at set > ImportStuckThreshold
          ago and no import_finished_at. The admin UI renders the unstuck
          banner only when this flag is true. Computed by the handler from
          the underlying timestamps; not persisted.
        type: boolean
      importedAt:
        type: string
      lastname:
        type: string
      mandateDate:
        type: string
      mandateReference:
        type: string
      memberNumber:
        type: string
      memberType:
        $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.MemberType'
      membershipStartDate:
        description: |-
          Configurable application-level fields (PROJ-8). Note: PROJ-49 moved
          consumption/feed_in/pv_power fields to metering_point — they now live
          on MeteringPoint, not here.
        type: string
      meteringPoints:
        items:
          $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.MeteringPoint'
        type: array
      needsInfoReason:
        type: string
      networkOperatorAuthorization:
        description: |-
          PROJ-44: Netzbetreiber-Vollmacht. Default FALSE; per-EEG via
          field_config konfigurierbar (Standard hidden). `_at` wird vom
          Service auf NOW() gesetzt, wenn der Wert von FALSE auf TRUE wechselt.
        type: boolean
      networkOperatorAuthorizationAt:
        type: string
      personsInHousehold:
        type: integer
      phone:
        type: string
      privacyAccepted:
        type: boolean
      privacyAcceptedAt:
        type: string
      privacyVersion:
        type: string
      rcNumber:
        type: string
      referenceNumber:
        type: string
      registerNumber:
        type: string
      rejectedAt:
        type: string
      residentCity:
        type: string
      residentStreet:
        type: string
      residentStreetNumber:
        type: string
      residentZip:
        type: string
      reviewedByUserId:
        type: string
      sepaMandateAccepted:
        type: boolean
      sepaMandateAcceptedAt:
        type: string
      startedAt:
        type: string
      status:
        $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ApplicationStatus'
      statusLog:
        items:
          $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.StatusLogEntry'
        type: array
      submittedAt:
        type: string
      targetParticipantId:
        type: string
      titel:
        type: string
      titelNach:
        type: string
      uidNumber:
        type: string
      updatedAt:
        type: string
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.AdminUpdateApplicationRequest:
    properties:
      accountHolder:
        maxLength: 150
        minLength: 1
        type: string
      adminNote:
        type: string
      bankName:
        maxLength: 255
        type: string
      birthDate:
        type: string
      companyName:
        maxLength: 150
        minLength: 1
        type: string
      einzugsart:
        enum:
        - kein_sepa
        - b2b
        - core
        type: string
      email:
        type: string
      firstname:
        maxLength: 100
        minLength: 1
        type: string
      iban:
        maxLength: 50
        minLength: 15
        type: string
      lastname:
        maxLength: 100
        minLength: 1
        type: string
      mandateDate:
        type: string
      mandateReference:
        maxLength: 255
        type: string
      memberType:
        enum:
        - private
        - sole_proprietor
        - farmer
        - municipality
        - company
        - association
        type: string
      meteringPoints:
        items:
          $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.CreateMeteringPointRequest'
        maxItems: 10
        minItems: 1
        type: array
      phone:
        maxLength: 50
        type: string
      registerNumber:
        maxLength: 50
        type: string
      residentCity:
        maxLength: 100
        minLength: 1
        type: string
      residentStreet:
        maxLength: 100
        minLength: 1
        type: string
      residentStreetNumber:
        maxLength: 50
        minLength: 1
        type: string
      residentZip:
        maxLength: 20
        minLength: 1
        type: string
      titel:
        maxLength: 50
        type: string
      titelNach:
        maxLength: 50
        type: string
      uidNumber:
        maxLength: 50
        type: string
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.ApplicationListItem:
    properties:
      companyName:
        type: string
      email:
        type: string
      firstname:
        type: string
      id:
        type: string
      lastname:
        type: string
      memberType:
        type: string
      rcNumber:
        type: string
      referenceNumber:
        type: string
      status:
        type: string
      submittedAt:
        type: string
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.ApplicationListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ApplicationListItem'
        type: array
      page:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.ApplicationResponse:
    properties:
      createdAt:
        type: string
      id:
        type: string
      referenceNumber:
        type: string
      status:
        type: string
      updatedAt:
        type: string
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.ApplicationStatus:
    enum:
    - draft
    - submitted
    - email_confirmed
    - under_review
    - needs_info
    - approved
    - rejected
    - imported
    - import_failed
    - awaiting_bank_confirmation
    - ready_for_activation
    - activated
    type: string
    x-enum-varnames:
    - StatusDraft
    - StatusSubmitted
    - StatusEmailConfirmed
    - StatusUnderReview
    - StatusNeedsInfo
    - StatusApproved
    - StatusRejected
    - StatusImported
    - StatusImportFailed
    - StatusAwaitingBankConfirmation
    - StatusReadyForActivation
    - StatusActivated
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.BulkActionRequest:
    properties:
      action:
        enum:
        - approve
        - reject
        - under_review
        type: string
      ids:
        items:
          type: string
        maxItems: 200
        minItems: 1
        type: array
      reason:
        maxLength: 2000
        type: string
    required:
    - action
    - ids
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.BulkActionResponse:
    properties:
      skipped:
        items:
          type: string
        type: array
      succeeded:
        items:
          type: string
        type: array
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.ChangeStatusRequest:
    properties:
      reason:
        type: string
      toStatus:
        type: string
    required:
    - toStatus
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.ChangeStatusResponse:
    properties:
      id:
        type: string
      status:
        type: string
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.ClearImportLockRequest:
    properties:
      reason:
        maxLength: 500
        minLength: 5
        type: string
    required:
    - reason
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.ConfirmEmailRequest:
    properties:
      token:
        maxLength: 200
        minLength: 10
        type: string
    required:
    - token
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.ConfirmEmailResponse:
    properties:
      alreadyConfirmed:
        type: boolean
      eegContactEmail:
        type: string
      eegName:
        type: string
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.ConsentInput:
    properties:
      isCentralPolicy:
        type: boolean
      title:
        type: string
      url:
        type: string
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.ConsentType:
    enum:
    - explicit
    - informational
    type: string
    x-enum-varnames:
    - ConsentTypeExplicit
    - ConsentTypeInformational
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.CreateApplicationRequest:
    properties:
      accountHolder:
        maxLength: 150
        minLength: 1
        type: string
      accuracyConfirmed:
        type: boolean
      bankName:
        maxLength: 255
        type: string
      birthDate:
        type: string
      companyName:
        maxLength: 150
        minLength: 1
        type: string
      cooperativeSharesCount:
        description: |-
          PROJ-37: Anzahl der gezeichneten Genossenschaftsanteile. Pflicht bei
          EEGs mit aktivierter Anteils-Erfassung, sonst optional (wird dann
          serverseitig ignoriert).
        minimum: 1
        type: integer
      electricHotWater:
        type: boolean
      electricVehicle:
        type: boolean
      electricVehicleAnnualKm:
        minimum: 0
        type: integer
      electricVehicleCount:
        description: |-
          PROJ-42: Details zur E-Fahrzeug-Erfassung. Werden serverseitig
          auf NULL gesetzt wenn electric_vehicle != true.
        minimum: 1
        type: integer
      email:
        type: string
      firstname:
        maxLength: 100
        minLength: 1
        type: string
      heatPump:
        type: boolean
      iban:
        maxLength: 50
        minLength: 15
        type: string
      lastname:
        maxLength: 100
        minLength: 1
        type: string
      memberType:
        enum:
        - private
        - sole_proprietor
        - farmer
        - municipality
        - company
        - association
        type: string
      membershipStartDate:
        description: |-
          Configurable application-level fields (PROJ-8). PROJ-49 moved
          consumption/feed_in/pv_power fields to MeteringPoint sub-struct.
        type: string
      meteringPoints:
        items:
          $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.CreateMeteringPointRequest'
        maxItems: 10
        minItems: 1
        type: array
      networkOperatorAuthorization:
        description: |-
          PROJ-44: Netzbetreiber-Vollmacht. Nur relevant wenn EEG das Feld als
          optional/required konfiguriert hat.
        type: boolean
      personsInHousehold:
        minimum: 0
        type: integer
      phone:
        maxLength: 50
        type: string
      privacyAccepted:
        type: boolean
      privacyVersion:
        type: string
      rcNumber:
        type: string
      registerNumber:
        maxLength: 50
        type: string
      residentCity:
        maxLength: 100
        minLength: 1
        type: string
      residentStreet:
        maxLength: 100
        minLength: 1
        type: string
      residentStreetNumber:
        maxLength: 50
        minLength: 1
        type: string
      residentZip:
        maxLength: 20
        minLength: 1
        type: string
      sepaMandateAccepted:
        type: boolean
      titel:
        maxLength: 50
        type: string
      titelNach:
        maxLength: 50
        type: string
      turnstileToken:
        description: Cloudflare Turnstile token (PROJ-16) — optional, verified server-side
          when TURNSTILE_SECRET_KEY is set
        type: string
      uidNumber:
        maxLength: 50
        type: string
    required:
    - accountHolder
    - accuracyConfirmed
    - email
    - iban
    - memberType
    - meteringPoints
    - privacyAccepted
    - privacyVersion
    - rcNumber
    - residentCity
    - residentStreet
    - residentStreetNumber
    - residentZip
    - sepaMandateAccepted
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.CreateMeteringPointRequest:
    properties:
      addressCity:
        maxLength: 255
        type: string
      addressStreet:
        description: |-
          Abweichende Adresse je Zählpunkt (PROJ-39). Entweder alle vier
          leer/NULL → Mitgliederadresse gilt, oder alle vier gesetzt →
          abweichende Adresse. Service-Layer prüft die All-or-Nothing-Regel.
        maxLength: 255
        type: string
      addressStreetNumber:
        maxLength: 50
        type: string
      addressZip:
        maxLength: 20
        type: string
      batteryControlAcceptable:
        description: |-
          PROJ-49 follow-up: „Speichersteuerung über die EEG vorstellbar?"
          Nur sinnvoll bei PV + vorhandenem Speicher (Service cleart sonst).
        type: boolean
      batterySizeKwh:
        minimum: 0
        type: number
      consumptionForecast:
        minimum: 0
        type: integer
      consumptionPreviousYear:
        description: |-
          PROJ-49: Energie-Felder pro Zählpunkt. Sichtbarkeit + Validierung
          per Direction/GenerationType im Service-Layer (siehe MeteringPoint).
        minimum: 0
        type: integer
      direction:
        enum:
        - CONSUMPTION
        - PRODUCTION
        type: string
      feedInForecast:
        minimum: 0
        type: integer
      feedInLimitKw:
        minimum: 0
        type: number
      feedInLimitPresent:
        type: boolean
      generationType:
        description: |-
          PROJ-45: Erzeugungsform + Batterie. GenerationType wird vom Service
          auf "pv" defaultet, wenn Direction=PRODUCTION und leer übermittelt.
        enum:
        - pv
        - hydro
        - wind
        - biomass
        type: string
      installationName:
        maxLength: 100
        type: string
      installationNumber:
        maxLength: 50
        type: string
      inverterManufacturer:
        maxLength: 100
        type: string
      meteringPoint:
        type: string
      participationFactor:
        maximum: 100
        minimum: 1
        type: integer
      pvPowerKwp:
        minimum: 0
        type: number
      transformer:
        description: Configurable metering-point-level fields (PROJ-8)
        maxLength: 100
        type: string
    required:
    - direction
    - meteringPoint
    - participationFactor
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.DocumentConsentView:
    properties:
      consentType:
        allOf:
        - $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ConsentType'
        description: |-
          ConsentType distinguishes `explicit` (member ticked a checkbox)
          from `informational` (document was shown as info-only). PROJ-36.
      consentedAt:
        type: string
      id:
        type: string
      isCentralPolicy:
        type: boolean
      title:
        type: string
      url:
        type: string
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.EEGSettingsComparisonResponse:
    properties:
      coreReachable:
        type: boolean
      coreUnreachableError:
        type: string
      differingFields:
        items:
          $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.EEGSettingsFieldDiff'
        type: array
      inSync:
        type: boolean
      lastSyncedAt:
        type: string
      logoSyncWarning:
        description: |-
          LogoSyncWarning is set by POST /sync when the master-data sync
          succeeded but the follow-up logo fetch did not — e.g. the core's
          logo is larger than the 256 KB cap, or has an unsupported MIME.
          Empty on the comparison endpoint and on a clean sync.
        type: string
      logoSyncedAt:
        description: |-
          LogoSyncedAt mirrors registration_entrypoint.eeg_logo_synced_at —
          the admin UI uses it to render a "Logo zuletzt synchronisiert"
          label next to the preview. NULL until the first successful logo
          sync.
        type: string
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.EEGSettingsFieldDiff:
    properties:
      coreValue:
        type: string
      field:
        type: string
      label:
        type: string
      localValue:
        type: string
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse:
    properties:
      code:
        type: string
      fields:
        additionalProperties:
          type: string
        type: object
      message:
        type: string
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.LegalDocumentItem:
    properties:
      id:
        type: string
      isCentralPolicy:
        type: boolean
      required:
        type: boolean
      sortOrder:
        type: integer
      title:
        type: string
      url:
        type: string
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.MarkImportedManuallyRequest:
    properties:
      memberNumber:
        maxLength: 50
        minLength: 1
        type: string
      reason:
        maxLength: 500
        type: string
      targetParticipantId:
        type: string
    required:
    - memberNumber
    - targetParticipantId
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.MemberType:
    enum:
    - private
    - sole_proprietor
    - farmer
    - municipality
    - company
    - association
    type: string
    x-enum-varnames:
    - MemberTypePrivate
    - MemberTypeSoleProprietor
    - MemberTypeFarmer
    - MemberTypeMunicipality
    - MemberTypeCompany
    - MemberTypeAssociation
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.MeterDirection:
    enum:
    - CONSUMPTION
    - PRODUCTION
    type: string
    x-enum-varnames:
    - DirectionConsumption
    - DirectionProduction
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.MeteringPoint:
    properties:
      addressCity:
        type: string
      addressStreet:
        description: |-
          Abweichende Adresse je Zählpunkt (PROJ-39). Wenn alle vier NULL,
          gilt die Mitgliederadresse. Wenn ≥1 gesetzt, müssen alle vier
          gesetzt sein (Validierung im Service-Layer).
        type: string
      addressStreetNumber:
        type: string
      addressZip:
        type: string
      applicationId:
        type: string
      batteryControlAcceptable:
        description: |-
          PROJ-49 follow-up: Mitglied-Antwort auf „Speichersteuerung über die
          EEG vorstellbar?". Nur sinnvoll bei PRODUCTION + generation_type='pv'
          UND wenn das Mitglied Batterie-Parameter angegeben hat (Service cleart
          in allen anderen Fällen).
        type: boolean
      batterySizeKwh:
        type: number
      consumptionForecast:
        type: integer
      consumptionPreviousYear:
        description: |-
          PROJ-49: Energie-Felder pro Zählpunkt. Service-Layer-Regeln:
            - ConsumptionPreviousYear / ConsumptionForecast: nur CONSUMPTION,
              sonst auf NULL gesetzt.
            - FeedInForecast: nur PRODUCTION, sonst NULL.
            - PvPowerKwp / FeedInLimitPresent / FeedInLimitKw: nur PRODUCTION
              mit GenerationType='pv', sonst NULL.
            - FeedInLimitKw nur wenn FeedInLimitPresent=true, sonst NULL.
        type: integer
      createdAt:
        type: string
      direction:
        $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.MeterDirection'
      feedInForecast:
        type: integer
      feedInLimitKw:
        type: number
      feedInLimitPresent:
        type: boolean
      generationType:
        description: |-
          PROJ-45: Erzeugungsform + Batterie. GenerationType ist Pflicht für
          PRODUCTION (DB-Check), NULL für CONSUMPTION. BatterySizeKwh +
          InverterManufacturer sind optional und nur befüllt wenn
          GenerationType='pv' — Service-Layer cleart sonst.
        type: string
      id:
        type: string
      installationName:
        type: string
      installationNumber:
        type: string
      inverterManufacturer:
        type: string
      meteringPoint:
        type: string
      participationFactor:
        type: integer
      pvPowerKwp:
        type: number
      transformer:
        description: Configurable metering-point-level fields (PROJ-8)
        type: string
      updatedAt:
        type: string
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.ReassignEEGRequest:
    properties:
      reason:
        maxLength: 500
        minLength: 5
        type: string
      targetRcNumber:
        maxLength: 50
        minLength: 1
        type: string
    required:
    - reason
    - targetRcNumber
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.RegistrationConfig:
    properties:
      active:
        type: boolean
      cooperativeRequiredShares:
        type: integer
      cooperativeShareAmountCents:
        type: integer
      cooperativeSharesEnabled:
        description: |-
          PROJ-37: only set when CooperativeSharesEnabled=true on the EEG.
          Both inner values are then non-nil and > 0.
        type: boolean
      fieldConfig:
        additionalProperties:
          type: string
        type: object
      introText:
        type: string
      legalDocuments:
        items:
          $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.LegalDocumentItem'
        type: array
      meteringPointPrefixConsumption:
        description: |-
          PROJ-52: pro Richtung konfigurierbarer Zählpunkt-Prefix. NULL =
          keine EEG-spezifische Vorbelegung (Mask zeigt nur "AT" als fix).
          Wenn gesetzt, baut die Public-Form die Zählpunkt-Mask dynamisch
          je nach gewählter Richtung; Service-Layer validiert Match beim Submit.
        type: string
      meteringPointPrefixProduction:
        type: string
      rcNumber:
        type: string
      requireEmailConfirmation:
        description: |-
          RequireEmailConfirmation (PROJ-31) wird in die Public-Form
          weitergereicht, damit die Erfolgsmeldung nach dem Einreichen den
          richtigen Hinweis zeigt („Bitte E-Mail bestätigen" statt
          „wird nun von unserem Team geprüft").
        type: boolean
      sepaMandateAtImport:
        description: |-
          SEPAMandateAtImport (PROJ-48) wird an die Public-Form weitergereicht,
          damit der Hinweistext „Mandat kommt jetzt vs. nach Import" korrekt
          gerendert werden kann. False = heutiges Verhalten (Mandat als Anhang
          in der Eingangsbestätigung); True = Mandat kommt erst beim Import
          mit Mitgliedsnummer als Mandatsreferenz.
        type: boolean
      sepaMandateEnabled:
        type: boolean
      showCentralPolicy:
        type: boolean
      title:
        type: string
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.ResetImportRequest:
    properties:
      reason:
        maxLength: 500
        minLength: 5
        type: string
    required:
    - reason
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.StatusLogEntry:
    properties:
      applicationId:
        type: string
      changedByUserId:
        type: string
      createdAt:
        type: string
      fromStatus:
        type: string
      id:
        type: string
      reason:
        type: string
      toStatus:
        type: string
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.SubmitRequest:
    properties:
      consents:
        items:
          $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ConsentInput'
        type: array
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.SubmitResponse:
    properties:
      id:
        type: string
      referenceNumber:
        type: string
      status:
        $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ApplicationStatus'
      submittedAt:
        type: string
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.UpdateAdminNoteRequest:
    properties:
      note:
        maxLength: 2000
        type: string
    type: object
  github_com_your-org_eegfaktura-member-onboarding_internal_shared.UpdateApplicationRequest:
    properties:
      accountHolder:
        maxLength: 150
        minLength: 1
        type: string
      accuracyConfirmed:
        type: boolean
      bankName:
        maxLength: 255
        type: string
      birthDate:
        type: string
      companyName:
        maxLength: 150
        minLength: 1
        type: string
      cooperativeSharesCount:
        description: |-
          PROJ-37: Admin/Member-Updates der gezeichneten Anteils-Anzahl. Bei
          EEGs ohne Anteils-Erfassung serverseitig ignoriert.
        minimum: 1
        type: integer
      email:
        type: string
      firstname:
        maxLength: 100
        minLength: 1
        type: string
      iban:
        maxLength: 50
        minLength: 15
        type: string
      lastname:
        maxLength: 100
        minLength: 1
        type: string
      memberType:
        enum:
        - private
        - sole_proprietor
        - farmer
        - municipality
        - company
        - association
        type: string
      meteringPoints:
        items:
          $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.CreateMeteringPointRequest'
        maxItems: 10
        minItems: 1
        type: array
      networkOperatorAuthorization:
        description: 'PROJ-44: Netzbetreiber-Vollmacht (Update durch Member im needs_info-Flow).'
        type: boolean
      phone:
        maxLength: 50
        type: string
      privacyAccepted:
        type: boolean
      privacyVersion:
        type: string
      registerNumber:
        maxLength: 50
        type: string
      residentCity:
        maxLength: 100
        minLength: 1
        type: string
      residentStreet:
        maxLength: 100
        minLength: 1
        type: string
      residentStreetNumber:
        maxLength: 50
        minLength: 1
        type: string
      residentZip:
        maxLength: 20
        minLength: 1
        type: string
      sepaMandateAccepted:
        type: boolean
      titel:
        maxLength: 50
        type: string
      titelNach:
        maxLength: 50
        type: string
      uidNumber:
        maxLength: 50
        type: string
    type: object
  internal_http.externalApplicationRequest:
    properties:
      accountHolder:
        maxLength: 150
        minLength: 1
        type: string
      birthDate:
        type: string
      companyName:
        maxLength: 150
        minLength: 1
        type: string
      electricHotWater:
        type: boolean
      electricVehicle:
        type: boolean
      email:
        type: string
      firstname:
        maxLength: 100
        minLength: 1
        type: string
      heatPump:
        type: boolean
      iban:
        maxLength: 50
        minLength: 15
        type: string
      lastname:
        maxLength: 100
        minLength: 1
        type: string
      memberType:
        enum:
        - private
        - sole_proprietor
        - farmer
        - municipality
        - company
        - association
        type: string
      membershipStartDate:
        description: |-
          Configurable fields (PROJ-8). PROJ-49 moved consumption / feed_in /
          pv_power to MeteringPoints[] sub-entries.
        type: string
      meteringPoints:
        items:
          $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.CreateMeteringPointRequest'
        maxItems: 10
        minItems: 1
        type: array
      personsInHousehold:
        minimum: 0
        type: integer
      phone:
        maxLength: 50
        type: string
      privacyAccepted:
        type: boolean
      registerNumber:
        maxLength: 50
        type: string
      residentCity:
        maxLength: 255
        minLength: 1
        type: string
      residentStreet:
        maxLength: 255
        minLength: 1
        type: string
      residentStreetNumber:
        maxLength: 50
        minLength: 1
        type: string
      residentZip:
        maxLength: 20
        minLength: 1
        type: string
      sepaMandateAccepted:
        type: boolean
      titel:
        maxLength: 50
        type: string
      uidNumber:
        maxLength: 50
        type: string
    required:
    - accountHolder
    - email
    - iban
    - memberType
    - meteringPoints
    - privacyAccepted
    - residentCity
    - residentStreet
    - residentStreetNumber
    - residentZip
    - sepaMandateAccepted
    type: object
host: member-onboarding.eegfaktura.at
info:
  contact: {}
  description: |-
    REST API for EEG (Energiegemeinschaft) member self-service registration and admin review.

    **Auth schemes:**
    - **Public** endpoints (`/api/public/*`): no auth required. Rate-limited + optional Turnstile CAPTCHA.
    - **Admin** endpoints (`/api/admin/*`): Keycloak Bearer JWT (`Authorization: Bearer <token>`).
    - **External** endpoints (`/api/external/*`): API key (`Authorization: Bearer moak_<key>`).
  title: eegfaktura Member Onboarding API
  version: "1.0"
paths:
  /api/admin/applications:
    get:
      description: Returns a paginated, filterable list of member applications. Tenant-admins
        only see their own EEG's applications; superusers see all.
      parameters:
      - description: Filter by status (draft|submitted|under_review|needs_info|approved|rejected|imported|import_failed)
        in: query
        name: status
        type: string
      - description: Filter by reference number (partial match)
        in: query
        name: reference_number
        type: string
      - description: Filter by member name — partial match across firstname, lastname,
          and company_name
        in: query
        name: name
        type: string
      - description: Filter by email (partial match)
        in: query
        name: email
        type: string
      - description: Filter by metering point ID
        in: query
        name: metering_point
        type: string
      - description: Filter by RC number (superuser only)
        in: query
        name: rc_number
        type: string
      - description: Filter by submission date from (RFC3339)
        in: query
        name: submitted_from
        type: string
      - description: Filter by submission date to (RFC3339)
        in: query
        name: submitted_to
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 20)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ApplicationListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List applications
      tags:
      - Admin
  /api/admin/applications/{id}:
    delete:
      description: Permanently deletes an application and all its metering points
        and status log entries.
      parameters:
      - description: Application UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: Application deleted
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete application
      tags:
      - Admin
    get:
      description: Returns full application data including metering points, status
        log, and document consents.
      parameters:
      - description: Application UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.AdminApplicationDetailResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "403":
          description: Tenant mismatch
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get application detail
      tags:
      - Admin
    put:
      consumes:
      - application/json
      description: Allows admins to correct application data. All fields are optional;
        only provided fields are updated.
      parameters:
      - description: Application UUID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.AdminUpdateApplicationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.AdminApplicationDetailResponse'
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "403":
          description: Tenant mismatch
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update application (admin)
      tags:
      - Admin
  /api/admin/applications/{id}/admin-note:
    patch:
      consumes:
      - application/json
      description: Replaces only the admin_note column. Does not touch member type,
        metering points, participation factors, or any other field — by design, so
        saving a note from the admin UI cannot accidentally reset application data.
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      - description: New note (empty string clears it)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.UpdateAdminNoteRequest'
      produces:
      - application/json
      responses:
        "204":
          description: no content
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update admin note
      tags:
      - Admin
  /api/admin/applications/{id}/approval-pdf:
    get:
      description: Generates and downloads the Beitrittsbestätigung PDF for an approved
        application. Available for status approved, imported, import_failed.
      parameters:
      - description: Application UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/pdf
      responses:
        "200":
          description: PDF file
          schema:
            type: file
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Download approval PDF
      tags:
      - Admin
  /api/admin/applications/{id}/clear-import-lock:
    post:
      consumes:
      - application/json
      description: Clears the in-flight slot on a stuck application without changing
        its status. Useful when the admin wants to retry the import — at the explicit
        risk of producing a duplicate in the core if the original attempt had already
        inserted there. A reason is mandatory and recorded in the status_log together
        with the previous target_participant_id (if any).
      parameters:
      - description: Application UUID
        in: path
        name: id
        required: true
        type: string
      - description: Reason for the lock release
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ClearImportLockRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.AdminApplicationDetailResponse'
        "400":
          description: Validation failed
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "403":
          description: Tenant mismatch
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "409":
          description: Application not in stuck import state
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Release a stuck import lock for retry (PROJ-34)
      tags:
      - Admin
  /api/admin/applications/{id}/export/excel:
    get:
      description: Downloads an Excel file (.xlsx) with the full application data
        formatted for eegFaktura import.
      parameters:
      - description: Application UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      responses:
        "200":
          description: Excel file
          schema:
            type: file
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Export application as Excel
      tags:
      - Admin
  /api/admin/applications/{id}/import:
    post:
      description: Triggers a synchronous import of an approved application into the
        eegFaktura core service. On success, the application transitions to status
        `imported` and `targetParticipantId` is populated. On failure, the status
        is set to `import_failed` and the error is recorded.
      parameters:
      - description: Application UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Import succeeded
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Application has no metering points
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "403":
          description: Tenant mismatch
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "409":
          description: Application not in approved status
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "500":
          description: Core service error or DB error
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "503":
          description: Core service not configured
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Import an approved application into eegFaktura core
      tags:
      - Admin
  /api/admin/applications/{id}/mark-imported-manually:
    post:
      consumes:
      - application/json
      description: Recovery for the orphan scenario where the core created the participant
        but the onboarding bookkeeping failed and left the application stuck in `approved`
        with an in-flight slot. Admin reads the participant UUID + member-number from
        eegFaktura and submits them; status transitions to `imported`. Refused with
        409 when the application is not in the stuck state.
      parameters:
      - description: Application UUID
        in: path
        name: id
        required: true
        type: string
      - description: Participant UUID + member-number from eegFaktura
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.MarkImportedManuallyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.AdminApplicationDetailResponse'
        "400":
          description: Validation failed
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "403":
          description: Tenant mismatch
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "409":
          description: Application not in stuck import state
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Manually close a stuck import (PROJ-34)
      tags:
      - Admin
  /api/admin/applications/{id}/next-member-number:
    get:
      description: Returns max(numeric participantNumber) + 1 over the existing participants
        in the application's tenant. Used by the import dialog to pre-fill the member
        number field; the admin may override it before submitting the import.
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: next_member_number
          schema:
            additionalProperties:
              type: integer
            type: object
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "503":
          description: Core not configured / lookup failed
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Suggest next member number for an application
      tags:
      - Admin
  /api/admin/applications/{id}/reassign-eeg:
    post:
      consumes:
      - application/json
      description: Moves an application from its current EEG to a different EEG. The
        admin must be authorized for BOTH source and target (or be a superuser). The
        reference number is regenerated from the target EEG's per-year counter. Old
        rc_number + old reference_number are archived in the status_log. Only reassignable
        while status ∈ {submitted, email_confirmed, under_review, needs_info}.
      parameters:
      - description: Application ID
        in: path

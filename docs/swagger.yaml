      - Admin
  /api/admin/applications/check-activation:
    post:
      description: Iterates over all applications in status `ready_for_activation`
        (filtered by the admin's tenant claim) and queries the eegFaktura core's GET
        /participant per tenant. Transitions matching applications to `activated`
        when the core participant status is ACTIVE. Returns a summary { checked, activated,
        errors }.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_importing.ActivationCheckResult'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Check core for activation status of pending applications
      tags:
      - Admin
  /api/admin/applications/drafts:
    delete:
      description: Deletes all applications in status `draft` for the calling admin's
        EEGs. Superusers delete all drafts across all EEGs.
      produces:
      - application/json
      responses:
        "200":
          description: deleted count
          schema:
            additionalProperties:
              type: integer
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_your-org_eegfaktura-member-onboarding_internal_shared.ErrorResponse'
      security:
      - BearerAuth: []

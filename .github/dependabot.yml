version: 2
updates:
  # Frontend: Next.js / React / TypeScript / npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Ignore: @types/node Major-Bumps. Die TypeScript-Typen müssen zur
    # Node-Runtime im Dockerfile.frontend / CI passen (aktuell Node 20).
    # Wenn die Runtime auf einen neuen Major angehoben wird, hier den
    # ignore-Eintrag entsprechend nachziehen.
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # Backend: Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # GitHub Actions Workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

version: 2
updates:
  # Frontend: Next.js / React / TypeScript / npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Groups: pakete, die wegen geteilter peer deps nur als Satz bumpen.
    # Ohne Gruppierung öffnet Dependabot mehrere PRs, die einzeln am
    # ERESOLVE-Konflikt scheitern (Beispiel: @tiptap/react@3.23.4 verlangt
    # @tiptap/core@3.23.4, aber @tiptap/starter-kit@3.22.4 hält core auf
    # 3.22.4 — beide Pakete + extension-link müssen zusammen).
    groups:
      tiptap:
        patterns:
          - "@tiptap/*"
    # Ignore: @types/node Major-Bumps. Die TypeScript-Typen müssen zur
    # Node-Runtime im Dockerfile.frontend / CI passen (aktuell Node 22).
    # Wenn die Runtime auf einen neuen Major angehoben wird, hier den
    # ignore-Eintrag entsprechend nachziehen.
    #
    # Ignore: tailwindcss + tailwind-merge Major-Bumps. tailwindcss v4
    # wurde in PROJ-22 versucht und am 2026-04-26 wegen Regressions
    # zurückgerollt (siehe features/PROJ-22-tailwindcss-v4-upgrade.md).
    # tailwind-merge v3 setzt Tailwind v4 voraus, scheitert hier daher
    # ebenfalls. Beide ignoriert bis PROJ-22 erfolgreich nachgeholt wird.
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwind-merge"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]

  # Backend: Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # GitHub Actions Workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

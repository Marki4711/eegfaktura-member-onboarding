version: 2
updates:
  # Frontend: Next.js / React / TypeScript / npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Groups: pakete, die wegen geteilter peer deps nur als Satz bumpen.
    # Ohne Gruppierung öffnet Dependabot mehrere PRs, die einzeln am
    # ERESOLVE-Konflikt scheitern (Beispiel: @tiptap/react@3.23.4 verlangt
    # @tiptap/core@3.23.4, aber @tiptap/starter-kit@3.22.4 hält core auf
    # 3.22.4 — beide Pakete + extension-link müssen zusammen).
    groups:
      tiptap:
        patterns:
          - "@tiptap/*"
    # Ignore: @types/node Major-Bumps. Die TypeScript-Typen müssen zur
    # Node-Runtime im Dockerfile.frontend / CI passen (aktuell Node 22).
    # Wenn die Runtime auf einen neuen Major angehoben wird, hier den
    # ignore-Eintrag entsprechend nachziehen.
    #
    # Ignore: tailwind-merge Major-Bumps. tailwind-merge v3 setzt
    # Tailwind CSS v4 voraus, wir sind aber bewusst auf v3 (PROJ-22
    # wurde reverted, siehe features/PROJ-22-tailwindcss-v4-upgrade.md).
    # Erst nach erfolgreichem Tailwind-v4-Upgrade hier den Ignore entfernen.
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwind-merge"
        update-types: ["version-update:semver-major"]

  # Backend: Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # GitHub Actions Workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

name: Snyk Weekly (Open Source + Container)

# Wöchentlicher Snyk-Scan für Pfade, die NICHT zu jedem Code-Push laufen
# müssen (Optimierung 2026-05-19, Free-Tier-Limits-Strategie):
#
#   - Snyk Open Source (Go + npm): fängt Zero-Day-CVEs, die zwischenzeitlich
#     in unveränderten Dependencies disclosed werden. Akute Updates kommen
#     ohnehin via Dependabot — das Wochen-Run ist die Sicherheits­abdeckung
#     für „CVE wurde am Mi disclosed, deps unverändert seit Mo".
#
#   - Snyk Container (4 Base-Images): die Images ändern sich nicht zwischen
#     Code-Pushes. Der wöchentliche Base-Image-Rebuild (weekly-rebuild.yml)
#     hat seinen eigenen Trivy-Scan vor dem Push in die Registry — dieser
#     Snyk-Container-Run ist die zusätzliche Sicht auf bekannte CVEs in
#     den deployten Images.
#
# Free-Tier-Footprint:
#   - 2 OpenSource-Tests × 4 Wochen = 8/Monat (Limit 200) ✓
#   - 4 Container-Tests × 4 Wochen = 16/Monat (Limit ~100) ✓
#
# Ausführen kann der Workflow auch manuell via workflow_dispatch — nützlich
# nach einem Dependency-Bump oder Base-Image-Wechsel, um nicht eine Woche
# auf den nächsten Cron-Run zu warten.

on:
  schedule:
    # Sonntags 04:00 UTC — niedrige Cluster-Auslastung, GitHub-Actions-
    # Quota wird nicht mit Werktags-CI-Last gemischt
    - cron: '0 4 * * 0'
  workflow_dispatch:
    # Manueller Trigger via GitHub-UI

jobs:
  snyk-open-source:
    name: Snyk Open Source (Go + npm)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@86b1cee1b8e110a78d528b3e1328a80e218111d2 # main
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: npm ci

      - name: Snyk Open Source – Go
        run: snyk test --file=go.mod --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true
        timeout-minutes: 10

      - name: Snyk Open Source – npm
        run: snyk test --file=package.json --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true
        timeout-minutes: 10

  snyk-container:
    name: Snyk Container (Base-Images)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@86b1cee1b8e110a78d528b3e1328a80e218111d2 # main
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Container – frontend (node:22-alpine)
        run: |
          docker pull node:22-alpine
          snyk container test node:22-alpine \
            --file=Dockerfile.frontend \
            --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true
        timeout-minutes: 10

      - name: Snyk Container – backend builder (golang:1.26-alpine)
        run: |
          docker pull golang:1.26-alpine
          snyk container test golang:1.26-alpine \
            --file=Dockerfile.backend \
            --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true
        timeout-minutes: 10

      - name: Snyk Container – backend runtime (alpine:3.20)
        run: |
          docker pull alpine:3.20
          snyk container test alpine:3.20 \
            --file=Dockerfile.backend \
            --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true
        timeout-minutes: 10

      - name: Snyk Container – postgres (postgres:16-alpine)
        run: |
          docker pull postgres:16-alpine
          snyk container test postgres:16-alpine \
            --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true
        timeout-minutes: 10

name: Build and Push Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
  # Weekly security rebuild: rebuilds images with latest base layers every Monday at 04:00 UTC
  schedule:
    - cron: '0 4 * * 1'

# Serialize runs on the same ref so the update-helm job never races against
# a concurrent run's git push. cancel-in-progress: false queues instead of
# cancelling, so every commit gets its image built and its Helm tags updated.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-backend:
    name: Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      sha_tag: ${{ steps.sha.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Compute short SHA
        id: sha
        run: echo "tag=sha-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: marki4711/eegfaktura-member-onboarding-backend
          tags: |
            type=sha,prefix=sha-,format=short
            type=semver,pattern=v{{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build (local, for scanning)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: Dockerfile.backend
          push: false
          load: true
          tags: eegfaktura-backend:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: eegfaktura-backend:scan
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      sha_tag: ${{ steps.sha.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Compute short SHA
        id: sha
        run: echo "tag=sha-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: marki4711/eegfaktura-member-onboarding-frontend
          tags: |
            type=sha,prefix=sha-,format=short
            type=semver,pattern=v{{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build (local, for scanning)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          load: true
          tags: eegfaktura-frontend:scan
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: eegfaktura-frontend:scan
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-helm:
    name: Update Helm image tags
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    # Only update values.yaml on branch pushes — tag releases keep the SHA reference
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Start from current main, not the SHA that triggered this run.
          # If a commit landed between trigger and now, we want to apply
          # the tag bump on top of it instead of producing a non-fast-forward
          # push that gets rejected.
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in values.yaml
        run: |
          SHA_TAG="${{ needs.build-backend.outputs.sha_tag }}"
          yq e ".images.backend.tag = \"${SHA_TAG}\"" -i helm/member-onboarding/values.yaml
          yq e ".images.frontend.tag = \"${SHA_TAG}\"" -i helm/member-onboarding/values.yaml

      - name: Commit updated Helm values
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/member-onboarding/values.yaml
          if git diff --staged --quiet; then
            echo "No tag change, nothing to commit."
            exit 0
          fi
          git commit -m "chore: update Helm image tags to ${{ needs.build-backend.outputs.sha_tag }} [skip ci]"
          # Retry-with-rebase: if another commit raced us between checkout
          # and push (manual push by a maintainer, or a parallel workflow
          # run's tag bump), rebase our 1-commit-ahead state onto the new
          # tip and try again. 5 attempts is plenty for the human-pace races
          # this is designed to absorb.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected on attempt ${attempt} — fetching + rebasing onto origin/main."
            git fetch origin main
            git rebase origin/main
          done
          echo "Helm-tag push still failing after 5 attempts; bailing out."
          exit 1

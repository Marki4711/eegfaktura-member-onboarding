name: Build and Push Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
  # Weekly security rebuild: rebuilds images with latest base layers every Monday at 04:00 UTC
  schedule:
    - cron: '0 4 * * 1'

jobs:
  build-backend:
    name: Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      sha_tag: ${{ steps.sha.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute short SHA
        id: sha
        run: echo "tag=sha-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: marki4711/eegfaktura-member-onboarding-backend
          tags: |
            type=sha,prefix=sha-,format=short
            type=semver,pattern=v{{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      sha_tag: ${{ steps.sha.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute short SHA
        id: sha
        run: echo "tag=sha-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: marki4711/eegfaktura-member-onboarding-frontend
          tags: |
            type=sha,prefix=sha-,format=short
            type=semver,pattern=v{{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-helm:
    name: Update Helm image tags
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    # Only update values.yaml on branch pushes — tag releases keep the SHA reference
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in values.yaml
        run: |
          SHA_TAG="${{ needs.build-backend.outputs.sha_tag }}"
          yq e ".images.backend.tag = \"${SHA_TAG}\"" -i helm/member-onboarding/values.yaml
          yq e ".images.frontend.tag = \"${SHA_TAG}\"" -i helm/member-onboarding/values.yaml

      - name: Commit updated Helm values
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/member-onboarding/values.yaml
          git diff --staged --quiet || git commit -m "chore: update Helm image tags to ${{ needs.build-backend.outputs.sha_tag }} [skip ci]"
          git push

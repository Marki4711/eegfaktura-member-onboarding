name: Snyk Security Scan

# Schlanker Push-Trigger (Optimierung 2026-05-19): nur Snyk Code (SAST) auf
# jedem main-Push, plus Monitor-Snapshot. Snyk Open Source und Container
# laufen separat im wöchentlichen Workflow (`snyk-weekly.yml`), damit die
# Free-Tier-Limits bei privatem Repo nicht gesprengt werden:
#
#   Free-Tier (private repo)
#     - Snyk Code:        100 Tests/Monat
#     - Snyk Open Source: 200 Tests/Monat
#     - Snyk Container:   ~100 Tests/Monat
#
# Bei ~5 Pushes/Tag = ~30 Code-Tests/Monat — komfortabel unter dem Limit.
#
# Pull-Request-Trigger wurde entfernt (Solo-Dev: push-to-main ist der
# Merge; PR-Scans wären redundant).

on:
  push:
    branches: [main]

jobs:
  snyk:
    name: Snyk SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@86b1cee1b8e110a78d528b3e1328a80e218111d2 # main
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: npm ci

      # SAST: static code analysis for Go + TypeScript. Mehrwert gegenüber
      # CodeQL (das auch läuft): andere Regel-Engine, fängt teils andere
      # Klassen von Findings. continue-on-error, damit ein Finding nicht
      # den ganzen Workflow rot macht — Findings landen in der GitHub-
      # Security-Tab.
      #
      # timeout-minutes: Snyk-Code-Test läuft normal in 1-2 min. Wenn das
      # Snyk-Backend hängt, soll der Step nach 5 min hart abbrechen statt
      # auf den GH-Default von 6 Stunden zu warten.
      - name: Snyk Code (SAST)
        run: snyk code test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true
        timeout-minutes: 5

      # snyk.io-Projekt-Snapshot aktuell halten. `monitor` zählt NICHT
      # gegen die Test-Limits, daher unbedenklich pro Push.
      - name: Snyk Monitor (snapshot)
        if: github.ref == 'refs/heads/main'
        run: snyk monitor --all-projects
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        timeout-minutes: 3

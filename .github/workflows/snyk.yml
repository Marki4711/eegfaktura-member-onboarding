name: Snyk Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  snyk:
    name: Snyk SAST + Dependency Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@86b1cee1b8e110a78d528b3e1328a80e218111d2 # main
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: npm ci

      # SAST: static code analysis for Go + TypeScript
      - name: Snyk Code (SAST)
        run: snyk code test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      # SCA: Go module dependency CVE scan
      - name: Snyk Open Source – Go
        run: snyk test --file=go.mod --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      # SCA: npm dependency CVE scan
      - name: Snyk Open Source – npm
        run: snyk test --file=package.json --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      # Container: scan the runtime base images for OS-level CVEs and
      # base-image EOL warnings (Snyk Advisor). Complements the proactive
      # endoflife.date check in eol-check.yml — Snyk reacts to actual
      # accumulating CVEs in the base image, endoflife.date warns ahead
      # of the EOL date itself. Pulled directly from Docker Hub rather
      # than building locally to keep the workflow fast; `--file=` points
      # Snyk at the Dockerfile so it can map findings to FROM-instructions.
      - name: Snyk Container – frontend (node:22-alpine)
        run: |
          docker pull node:22-alpine
          snyk container test node:22-alpine \
            --file=Dockerfile.frontend \
            --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Snyk Container – backend builder (golang:1.26-alpine)
        run: |
          docker pull golang:1.26-alpine
          snyk container test golang:1.26-alpine \
            --file=Dockerfile.backend \
            --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Snyk Container – backend runtime (alpine:3.20)
        run: |
          docker pull alpine:3.20
          snyk container test alpine:3.20 \
            --file=Dockerfile.backend \
            --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Snyk Container – postgres (postgres:16-alpine)
        run: |
          docker pull postgres:16-alpine
          snyk container test postgres:16-alpine \
            --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      # Keep snyk.io project snapshot up to date
      - name: Snyk Monitor (snapshot)
        if: github.ref == 'refs/heads/main'
        run: snyk monitor --all-projects
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
